appId: cn.2pixel.desktop
productName: TwoPixel
copyright: Copyright © 2026 TwoPixel.
artifactName: "TwoPixel-${version}-${arch}.${ext}"

electronVersion: "39.2.7"

# Hook to compile macOS 26+ Liquid Glass icon after packaging
afterPack: scripts/afterPack.cjs

directories:
  output: release
  buildResources: resources

npmRebuild: false
buildDependenciesFromSource: false

files:
  - dist/**/*
  - "!dist/renderer/src/**"
  - "!**/*.map"
  - package.json
  # Include bundled MCP servers (bridge + session) for Codex sessions
  - resources/bridge-mcp-server/**/*
  - resources/session-mcp-server/**/*
  # Include Pi agent server subprocess for Pi SDK sessions
  - resources/pi-agent-server/**/*
  # Include built-in MCP servers
  - packages/builtin-mcps/**/*
  # Note: Bundled assets (docs, themes, permissions, tool-icons) are in resources/
  # and copied to dist/resources/ by build:copy. They're included via dist/**/* above.
  # Include network interceptor for API error capture and MCP schema injection
  - packages/shared/src/unified-network-interceptor.ts
  - packages/shared/src/interceptor-common.ts
  - packages/shared/src/feature-flags.ts
  - packages/shared/src/interceptor-request-utils.ts
  # Include CLI tool Python scripts (platform-independent)
  - resources/scripts/**/*
  # Include CLI tool shell wrappers (platform-independent, both Unix and Windows)
  - resources/bin/markitdown
  - resources/bin/markitdown.cmd
  - resources/bin/pdf-tool
  - resources/bin/pdf-tool.cmd
  - resources/bin/xlsx-tool
  - resources/bin/xlsx-tool.cmd
  - resources/bin/doc-diff
  - resources/bin/doc-diff.cmd
  - resources/bin/img-tool
  - resources/bin/img-tool.cmd
  - resources/bin/docx-tool
  - resources/bin/docx-tool.cmd
  - resources/bin/pptx-tool
  - resources/bin/pptx-tool.cmd
  - resources/bin/ical-tool
  - resources/bin/ical-tool.cmd
  # Include bundled uv binary (platform-specific, only the relevant one ships per build)
  - resources/bin/darwin-arm64/**/*
  - resources/bin/darwin-x64/**/*
  - resources/bin/win32-x64/**/*
  - resources/bin/linux-x64/**/*
  # Include bundled Bun runtime (platform-specific, set by build script)
  - vendor/bun/**/*
  # Include bundled Codex binary (platform-specific, downloaded by build script)
  - vendor/codex/**/*
  # Include bundled Copilot CLI binary (platform-specific, copied from node_modules by build script)
  - vendor/copilot/**/*
  # Exclude everything from node_modules (will use extraResources for SDK)
  - "!node_modules/**/*"

extraResources:
  - from: "../../LICENSE"
    to: "LICENSE"
  - from: "../../NOTICE"
    to: "NOTICE"

# SDK is included as per-platform extraResources (below) to bypass node_modules auto-exclusion
# and to apply platform-specific ripgrep binary filtering.
# Since electron-builder v20.15.2, directories named "node_modules" are automatically excluded.
# Using extraResources with explicit from/to paths works around this limitation.
# See: https://github.com/electron-userland/electron-builder/issues/3104

extraMetadata:
  main: dist/main.cjs

# Auto-update: electron-updater fetches from this URL for update manifests (.yml files)
publish:
  provider: generic
  url: https://agents.2pixel.cn/electron/latest

# Use ASAR to dramatically improve macOS performance (prevents Gatekeeper from scanning 10k+ files)
asar: true
asarUnpack:
  - "vendor/**/*"
  - "resources/bin/**/*"
  - "resources/scripts/**/*"
  - "resources/pi-agent-server/**/*"
  - "resources/session-mcp-server/**/*"
  - "resources/bridge-mcp-server/**/*"
  - "packages/builtin-mcps/**/*"

mac:
  category: public.app-category.productivity
  icon: resources/icon.icns
  # macOS 26+ Liquid Glass: Tell macOS to look for icon in Assets.car
  # The value must match --app-icon used in actool (see afterPack.js)
  extendInfo:
    CFBundleIconName: AppIcon
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extraResources:
    - from: node_modules/@anthropic-ai/claude-agent-sdk
      to: app/node_modules/@anthropic-ai/claude-agent-sdk
      filter:
        - "**/*"
        - "!vendor/ripgrep/arm64-linux/**"
        - "!vendor/ripgrep/x64-linux/**"
        - "!vendor/ripgrep/x64-win32/**"
  # Exclude binaries for other platforms
  files:
    - "!**/vendor/codex/linux-*/**"
    - "!**/vendor/codex/win32-*/**"
    - "!**/vendor/copilot/linux-*/**"
    - "!**/vendor/copilot/win32-*/**"
    - "!**/resources/bin/win32-*/**"
    - "!**/resources/bin/linux-*/**"
  # Use predictable naming for macOS packages (applies to zip; dmg uses its own config below)
  # Ensure the product name is set correctly so the .app name matches what electron-builder expects
  artifactName: "TwoPixel-${arch}.${ext}"
  # Code signing & notarization
  notarize: true
  identity: "9E1D50773E716EABD18929221C447826046B7847"

dmg:
  # Use predictable naming: TwoPixel-arm64.dmg, TwoPixel-x64.dmg
  artifactName: "TwoPixel-${arch}.dmg"
  # Custom background (multi-resolution TIFF with 1x+2x for retina support)
  background: resources/dmg-background.tiff
  # Use app icon as the mounted volume icon in Finder
  icon: resources/icon.icns
  iconSize: 80
  title: "TwoPixel"
  contents:
    - x: 130
      y: 200
    - x: 410
      y: 200
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  # Use predictable naming: TwoPixel-x64.exe
  artifactName: "TwoPixel-${arch}.${ext}"
  files:
    # Exclude binaries for other platforms
    - "!**/vendor/codex/darwin-*/**"
    - "!**/vendor/codex/linux-*/**"
    - "!**/vendor/copilot/darwin-*/**"
    - "!**/vendor/copilot/linux-*/**"
    - "!**/resources/bin/darwin-*/**"
    - "!**/resources/bin/linux-*/**"
    # WORKAROUND: Exclude bun, codex, copilot, and uv from regular files on Windows.
    # electron-builder's npm node module collector causes EBUSY errors when copying
    # .exe files because it scans/locks files while simultaneously trying to copy them.
    # Moving them to extraResources avoids this by copying before the collector runs.
    # See: https://github.com/electron-userland/electron-builder/issues/8250
    - "!vendor/bun/**/*"
    - "!vendor/codex/**/*"
    - "!vendor/copilot/**/*"
    - "!**/resources/bin/win32-x64/**"
  # Copy executables as extraResources to avoid EBUSY file locking (see comment above)
  extraResources:
    - from: node_modules/@anthropic-ai/claude-agent-sdk
      to: app/node_modules/@anthropic-ai/claude-agent-sdk
      filter:
        - "**/*"
        - "!vendor/ripgrep/arm64-darwin/**"
        - "!vendor/ripgrep/x64-darwin/**"
        - "!vendor/ripgrep/arm64-linux/**"
        - "!vendor/ripgrep/x64-linux/**"
    - from: vendor/bun/bun.exe
      to: vendor/bun/bun.exe
    - from: vendor/codex/win32-x64
      to: app/vendor/codex/win32-x64
    - from: vendor/copilot/win32-x64
      to: app/vendor/copilot/win32-x64
    - from: resources/bin/win32-x64
      to: app/resources/bin/win32-x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # Per-user install to %LOCALAPPDATA%\Programs\ (not Program Files).
  # Bun subprocess cannot read/write files in Program Files due to Windows permissions.
  perMachine: false
  deleteAppDataOnUninstall: true
  include: build/installer.nsh

linux:
  icon: resources/icon.png
  category: Utility
  maintainer: "Craft Docs Ltd. <support@craft.do>"
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: "Craft-Agents-${arch}.${ext}"
  extraResources:
    - from: node_modules/@anthropic-ai/claude-agent-sdk
      to: app/node_modules/@anthropic-ai/claude-agent-sdk
      filter:
        - "**/*"
        - "!vendor/ripgrep/arm64-darwin/**"
        - "!vendor/ripgrep/x64-darwin/**"
        - "!vendor/ripgrep/x64-win32/**"
  # Exclude binaries for other platforms
  files:
    - "!**/vendor/codex/darwin-*/**"
    - "!**/vendor/codex/win32-*/**"
    - "!**/vendor/copilot/darwin-*/**"
    - "!**/vendor/copilot/win32-*/**"
    - "!**/resources/bin/darwin-*/**"
    - "!**/resources/bin/win32-*/**"
